<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Termux Cloud Engine</title>
    <style>
        body {
            background-color: #000000;
            color: #00FF41;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            margin: 0;
        }
        #terminalBox {
            width: 100%;
            height: 85vh;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.4;
        }
        #inputLine {
            display: flex;
            align-items: center;
            border-top: 1px solid #222;
            padding-top: 8px;
        }
        #prompt {
            color: #00FF41;
            font-weight: bold;
            margin-right: 8px;
        }
        #cmdInput {
            flex: 1;
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: inherit;
            font-size: 16px;
            outline: none;
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="terminalBox">Welcome to Cloud Termux Engine v1.0<br>Type 'python3 --version' or 'uname -a' to test backend server.<br><br>$ </div>
    
    <div id="inputLine">
        <span id="prompt">$</span>
        <input type="text" id="cmdInput" placeholder="Type Linux or Python commands..." autofocus autocomplete="off" autocapitalize="off">
    </div>

    <script>
        const socket = io();
        const cmdInput = document.getElementById('cmdInput');
        const terminalBox = document.getElementById('terminalBox');

        cmdInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const command = cmdInput.value.trim();
                cmdInput.value = '';

                if (!command) return;

                // Echo the command locally on screen
                terminalBox.innerHTML += command + '\n';

                // Send to Render backend via WebSockets channel
                socket.emit('command', command);
                
                // Auto scroll layout down
                terminalBox.scrollTop = terminalBox.scrollHeight;
            }
        });

        // Listen response back from Render engine
        socket.on('output', function(data) {
            terminalBox.innerHTML += data;
            terminalBox.scrollTop = terminalBox.scrollHeight;
        });
    </script>
</body>
</html>
